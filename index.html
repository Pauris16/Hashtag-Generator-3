<!DOCTYPE html>

</head>
<body>

<div class="container">
  <h1>🔥 Hashtag Generátor</h1>

  <select id="category">
    <option value="tiktok">TikTok</option>
    <option value="instagram">Instagram</option>
    <option value="gaming">Gaming</option>
    <option value="fitness">Fitness</option>
    <option value="cars">Cars</option >

  <button onclick="generate()">Generovať</button>

  <!-- REKLAMA -->

  <div id="result"></div>

  <button onclick="copyText()" class="copy">Kopírovať</button>

</div>
